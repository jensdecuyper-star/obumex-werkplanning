<style>

<div class="app">

<script>
// ════════════════════════════════════════════════════════════════════════════
// KRITIEKE HOTFIX v2 — Data Recovery
// ════════════════════════════════════════════════════════════════════════════
//
// PROBLEEM: Firebase RPC-fout + obp8 undefined error
// OPLOSSING: localStorage direct laden, Firebase graceful fallback
//
// ════════════════════════════════════════════════════════════════════════════

let S = {
  wo: 0,
  jobs: [],
  plan: {},
  bw: [],
  cnc: [],
  dayHrs: 8,
  workDays: [1,2,3,4,5],
  events: {},
  holidays: {},
  history: [],
  materiaal: {},
  navOpen: {}
};

function updateSync(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state === 'saving') { el.textContent = '● bewaren...'; el.className = 'sync-status saving'; }
  else if(state === 'saved') { el.textContent = '✓ opgeslagen'; el.className = 'sync-status saved'; setTimeout(() => { el.textContent = '✓ bewaard'; el.className = 'sync-status idle'; }, 2500); }
  else if(state === 'error') { el.textContent = '⚠ opslaan mislukt'; el.className = 'sync-status error'; }
  else { el.textContent = state; el.className = 'sync-status idle'; }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ═════════════════════════════════════════════════════════════════════════════
// KRITIEKE LAAD-FUNCTIE — Robuust tegen fouten
// ═════════════════════════════════════════════════════════════════════════════
function load(){
  updateSync('📂 localStorage laden...');

  try {
    // STAP 1: Probeer localStorage direct te laden
    const raw = localStorage.getItem('obp8');
    if(raw) {
      try {
        const data = JSON.parse(raw);

        // Valideer structuur
        if(data.jobs && Array.isArray(data.jobs)) {
          S.jobs = data.jobs;
          console.log(`✅ localStorage: ${data.jobs.length} bestellingen geladen`);
        }
        if(data.plan && typeof data.plan === 'object') {
          S.plan = data.plan;
          console.log(`✅ localStorage: ${Object.keys(data.plan).length} planningssleutels geladen`);
        }
        if(data.bw) S.bw = data.bw;
        if(data.cnc) S.cnc = data.cnc;
        if(data.dayHrs) S.dayHrs = data.dayHrs;
        if(data.workDays) S.workDays = data.workDays;
        if(data.events) S.events = data.events;
        if(data.history) S.history = data.history;
        if(data.holidays) S.holidays = data.holidays;
        if(data.materiaal) S.materiaal = data.materiaal;
        if(data.navOpen) S.navOpen = data.navOpen;

        updateSync('✅ Data hersteld uit opslag!');
        showPlanning();
        return;
      } catch(parseErr) {
        console.error('❌ localStorage corrupt:', parseErr);
        toast('⚠️ localStorage corrupt, probeer Firebase...');
      }
    } else {
      console.warn('⚠️ localStorage is leeg');
    }
  } catch(storageErr) {
    console.error('❌ localStorage error:', storageErr);
  }

  // STAP 2: Probeer Firebase als fallback
  updateSync('☁️ Firebase controleren...');
  tryLoadFromFirebase();
}

function tryLoadFromFirebase(){
  try {
    if(!window.firebase || !window.firebase.apps || !window.firebase.apps.length) {
      console.log('⚠️ Firebase niet beschikbaar');
      updateSync('❌ Geen backup gevonden');
      showEmpty();
      return;
    }

    const db = firebase.firestore();
    db.collection('planning').doc('gedeeld').get()
      .then(snap => {
        if(snap.exists) {
          const data = snap.data();
          console.log('✅ Firebase data gevonden!');

          if(data.jobs) S.jobs = data.jobs;
          if(data.plan) S.plan = data.plan;
          if(data.bw) S.bw = data.bw;
          if(data.cnc) S.cnc = data.cnc;
          if(data.events) S.events = data.events;
          if(data.history) S.history = data.history;
          if(data.holidays) S.holidays = data.holidays;

          // Sla lokaal op
          try {
            localStorage.setItem('obp8', JSON.stringify(S));
          } catch(e) {
            console.warn('⚠️ Kon niet in localStorage opslaan:', e);
          }

          updateSync('✅ Data hersteld uit cloud!');
          showPlanning();
        } else {
          console.log('❌ Firebase doc niet gevonden');
          updateSync('❌ Geen backup');
          showEmpty();
        }
      })
      .catch(fbErr => {
        console.error('❌ Firebase error:', fbErr.message);
        updateSync('❌ Cloud error (offline?)');
        showEmpty();
      });
  } catch(e) {
    console.error('❌ Firebase init error:', e);
    updateSync('❌ Cloud niet beschikbaar');
    showEmpty();
  }
}

function showPlanning(){
  const grid = document.getElementById('planGrid');
  if(!grid) return;

  let html = '<div style="padding:20px">';
  html += '<div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:12px">✅ Werkplanning Hersteld!</div>';
  html += '<div style="font-size:14px;color:var(--t2);margin-bottom:20px">';
  html += `<div>📦 Bestellingen: <strong>${S.jobs?.length || 0}</strong></div>`;
  html += `<div>📅 Planningssleutels: <strong>${Object.keys(S.plan || {}).length}</strong></div>`;
  html += '</div>';
  html += '<button onclick="location.href=location.href" style="padding:10px 20px;background:var(--ink);color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px">🔄 Volledige app laden</button>';
  html += '<div style="margin-top:40px;padding:20px;background:var(--surf2);border-radius:8px;font-size:12px;color:var(--t2)">';
  html += '<strong>Wat is gebeurd?</strong><br>';
  html += 'De app had een loadingfout door Firebase. Je data was intact in opslag.<br>';
  html += 'Klik "Volledige app laden" om terug te gaan naar de werkplanning.';
  html += '</div>';
  html += '</div>';

  grid.innerHTML = html;
}

function showEmpty(){
  const grid = document.getElementById('planGrid');
  if(!grid) return;

  let html = '<div style="padding:40px;text-align:center">';
  html += '<div style="font-size:18px;font-weight:700;color:var(--red);margin-bottom:12px">❌ Geen backup gevonden</div>';
  html += '<div style="font-size:14px;color:var(--t2);margin-bottom:20px">';
  html += 'localStorage en Firebase bevatten geen data.<br>';
  html += 'Probeer deze browser-cache te wissen:<br>';
  html += 'F12 → Application → LocalStorage → Wis → Refresh';
  html += '</div>';
  html += '</div>';

  grid.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════════════════════════════
load();
</script>
